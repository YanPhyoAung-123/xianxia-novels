kind = "web"
previewPath = "/"
title = "Novel Translator"
version = "1.0.0"
id = "artifacts/novel-translator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21430

[services.development]
run = "pnpm --filter @workspace/novel-translator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novel-translator", "run", "build" ]
publicDir = "artifacts/novel-translator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21430"
BASE_PATH = "/"
